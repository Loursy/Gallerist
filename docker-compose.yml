services:
  db:
    image: postgres:15-alpine
    container_name: gallerist-db
    environment:
      POSTGRES_DB: gallerist_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gallerist_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gallerist-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gallerist_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secretpassword
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
